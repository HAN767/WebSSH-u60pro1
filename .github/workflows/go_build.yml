name: Cross Compile WebSSH for U60Pro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 签出项目源码
      uses: actions/checkout@v4

    - name: 2. 部署 Go 语言云端编译环境
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: 3. 依赖项下载与环境准备
      run: |
        go mod tidy || true

    - name: 4. 盲搜并编译所有 Go 源码 (强行生成主程序)
      run: |
        # 这一步会自动扫描当前目录下的所有Go代码，不管它叫 install.go 还是 main.go，强行编译成 webssh_u60pro
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o webssh_u60pro . || GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o webssh_u60pro *.go || true

    - name: 5. 智能监控脚本与自启文件全自动打包
      run: |
        mkdir -p webssh_release
        
        # 1. 把刚刚强行编译出来的核心主程序放进去
        cp webssh_u60pro webssh_release/ 2>/dev/null || true
        
        # 2. 去 webssh 文件夹里把监控脚本和自启文件捞出来，塞进压缩包
        cp webssh/network_monitor.sh webssh_release/ 2>/dev/null || true
        cp webssh/.profile webssh_release/ 2>/dev/null || true
        
        # 3. 封装打包成 zip
        cd webssh_release
        zip -r ../webssh-u60pro-full-monitor.zip .

    - name: 6. 将满血版工具箱发布到 GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: u60pro-webssh-monitor-firmware
        path: webssh-u60pro-full-monitor.zip
