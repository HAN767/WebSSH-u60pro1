name: Pack WebSSH for U60Pro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 签出项目源码
      uses: actions/checkout@v4

    - name: 2. 彻底清理 Git 内部垃圾文件 (防止打包错误缓存)
      run: |
        rm -rf .git
        rm -rf .github

    - name: 3. 精准收集有用文件并打包
      run: |
        mkdir -p webssh_release
        
        # 1. 不管监控脚本和自启文件藏在哪，抓到打包根目录
        find . -name "network_monitor.sh" -exec cp {} webssh_release/ \; 2>/dev/null || true
        find . -name ".profile" -exec cp {} webssh_release/ \; 2>/dev/null || true
        
        # 2. 强行把原作者项目里的核心内容（html网页、静态文件、mihomo内核等）一起复制过去
        # 排除掉我们创建的临时目录本身
        cp -r [a-zA-Z0-9]* webssh_release/ 2>/dev/null || true
        
        # 3. 封装打包成 zip
        cd webssh_release
        # 再次确保删除可能遗留的垃圾
        rm -rf .git .github webssh_release 2>/dev/null || true
        zip -r ../webssh-u60pro-final.zip .

    - name: 4. 将满血版工具箱发布到 GitHub
      uses: actions/upload-artifact@v4
      with:
        name: u60pro-webssh-monitor-firmware
        path: webssh-u60pro-final.zip
