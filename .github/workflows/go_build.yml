name: Cross Compile WebSSH for U60Pro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 签出项目源码
      uses: actions/checkout@v4

    - name: 2. 部署 Go 语言云端编译环境
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: 3. 依赖项下载与环境准备
      run: |
        go mod tidy || true

    - name: 4. 编译核心主程序
      run: |
        # 强行编译出核心主程序
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o webssh_u60pro . || GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o webssh_u60pro *.go || true

    - name: 5. 全盘搜刮文件并打包 (核心修复)
      run: |
        mkdir -p webssh_release
        
        # 1. 抓取主程序
        cp webssh_u60pro webssh_release/ 2>/dev/null || true
        
        # 2. 不管你在哪里，全盘盲搜 network_monitor.sh 和 .profile 并抓进压缩包
        find . -name "network_monitor.sh" -exec cp {} webssh_release/ \; 2>/dev/null || true
        find . -name ".profile" -exec cp {} webssh_release/ \; 2>/dev/null || true
        
        # 3. 封装打包成 zip
        cd webssh_release
        zip -r ../webssh-u60pro-full-monitor.zip .

    - name: 6. 将满血版工具箱发布到 GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: u60pro-webssh-monitor-firmware
        path: webssh-u60pro-full-monitor.zip
