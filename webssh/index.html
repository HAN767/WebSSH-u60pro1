<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#315697">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <meta name="color-scheme" content="light dark">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="WebSSH">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>WebSSH for U60Pro</title>
    <style>
      :root {
        --app-safe-top: env(safe-area-inset-top, 0px);
        --app-safe-right: env(safe-area-inset-right, 0px);
        --app-safe-bottom: env(safe-area-inset-bottom, 0px);
        --app-safe-left: env(safe-area-inset-left, 0px);
      }
      html.ios-pwa {
        box-sizing: border-box;
        background: #315697; /* Main 页浅色渐变起点 */
      }

      html.webssh-pwa-frame-inner {
        --app-safe-top: 0px;
        --app-safe-right: 0px;
        --app-safe-bottom: 0px;
        --app-safe-left: 0px;
      }

      html.webssh-pwa-frame-inner input,
      html.webssh-pwa-frame-inner textarea,
      html.webssh-pwa-frame-inner select,
      html.webssh-pwa-frame-inner .el-input__inner,
      html.webssh-pwa-frame-inner .el-textarea__inner,
      html.webssh-pwa-frame-inner .el-select__input {
        font-size: 16px !important;
      }

      html.webssh-pwa-frame-inner .el-select__selected-item,
      html.webssh-pwa-frame-inner .el-select__placeholder {
        font-size: inherit;
      }

      html.webssh-pwa-frame-outer,
      html.webssh-pwa-frame-outer body,
      html.webssh-pwa-frame-outer #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .webssh-pwa-frame-shell {
        position: fixed;
        top: var(--app-safe-top);
        right: var(--app-safe-right);
        bottom: var(--app-safe-bottom);
        left: var(--app-safe-left);
        overflow: hidden;
        background: #0f172a;
      }

      .webssh-pwa-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #0f172a;
      }

      @media (prefers-color-scheme: dark) {
        html.ios-pwa {
          background: #263144; /* 夜间模式深色渐变起点，需同等优先级覆盖上面的浅色 */
        }
      }

      html,
      body,
      #app {
        height: 100%;
        margin: 0px;
        padding: 0px;
        font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      }

      html {
        background: #315697;
      }

      /* 夜间模式：html 背景在页面加载完成前和过滚动回弹区域可见，
         跟随 Main 页深色渐变的起始色，避免露出浅色蓝 */
      @media (prefers-color-scheme: dark) {
        html {
          background: #0f172a;
        }
      }

      body {
        overflow-x: hidden;
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
    <script>
      // iOS 主屏幕 Web App 的 navigator.standalone 为 true，
      // 兜底处理不匹配 display-mode 媒体查询的旧版 iOS
      if (navigator.standalone) {
        document.documentElement.classList.add("ios-pwa");
        document
          .querySelector('meta[name="viewport"]')
          ?.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover");
      }
    </script>
  </head>

  <body>
    <noscript>
      <strong>请开启JavaScript支持</strong>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>

</html>
